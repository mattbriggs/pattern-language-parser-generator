site_name: Pattern Language Miner
site_description: >-
  A corpus-driven Python tool for extracting, clustering, and cataloguing
  reusable content patterns from text, Markdown, and HTML documents.
site_author: Pattern Language Miner Contributors
site_url: https://your-org.github.io/pattern-language-miner/
repo_url: https://github.com/your-org/pattern-language-miner
repo_name: pattern-language-miner
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - mermaid2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - User Guide:
      - Getting Started: user-guide/getting-started.md
      - Installation: user-guide/installation.md
      - Quick Start: user-guide/quick-start.md
      - Commands: user-guide/commands.md
      - Configuration: user-guide/configuration.md
      - Workflows: user-guide/workflows.md
      - Troubleshooting: user-guide/troubleshooting.md
  - Reference:
      - CLI Reference: reference/cli.md
      - Configuration Reference: reference/configuration.md
      - Docker & Weaviate: reference/docker.md
  - Design:
      - Architecture: design/architecture.md
      - Design Patterns: design/design-patterns.md
  - Requirements: srs.md
  - Product:
      - Changelog: changelog.md
      - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/your-org/pattern-language-miner
  generator: false

copyright: Copyright &copy; 2024 Pattern Language Miner Contributors
